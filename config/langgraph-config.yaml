# protoPen LangGraph agent configuration
# Used when AGENT_BACKEND=langgraph

model:
  provider: gateway  # LiteLLM gateway on ava (Tailscale)
  name: protolabs/reasoning
  api_base: http://ava:4000/v1
  api_key: ""  # read from OPENAI_API_KEY env at runtime
  temperature: 0.3
  max_tokens: 4096
  max_iterations: 75

subagents:
  # Security Research
  threat_scanner:
    enabled: true
    tools: [cve_search, security_feeds, github_trending, browser, security_memory]
    max_turns: 30
  vuln_analyst:
    enabled: true
    tools: [cve_search, browser, security_memory, target_intel]
    max_turns: 40
  intel_reporter:
    enabled: true
    tools: [security_memory, discord_feed]
    max_turns: 20
  # Pentest
  recon:
    enabled: true
    tools: [device_manager, portapack, flipper, marauder, blackarch, engagement]
    max_turns: 30
  exploit:
    enabled: true
    tools: [device_manager, portapack, flipper, marauder, blackarch, engagement]
    max_turns: 25
  reporter:
    enabled: true
    tools: [engagement, security_memory, discord_feed]
    max_turns: 20

middleware:
  knowledge: true
  audit: true
  memory: true
  # Per-tool execution backstop: abort any single tool call that exceeds
  # tool_timeout_seconds so a hung tool can't wedge the whole turn. Generous
  # by design (a backstop, not a tight bound); `task` subagent delegation is
  # exempt. Set tool_timeout_seconds <= 0 to disable.
  tool_timeout: true
  tool_timeout_seconds: 600

# Context compaction — summarize old history near the context limit so a long
# autonomous session doesn't overflow the window. ON by default.
#   trigger: "fraction:0.8" | "tokens:120000" | "messages:80"
# NOTE: "fraction:"/"tokens:" need the model's context-window profile, which the
# custom gateway alias (protolabs/reasoning) doesn't expose — so we use an
# explicit message-count trigger here for deterministic behavior (the wiring
# would otherwise auto-fall back to one and log a warning each graph build).
#   model: a cheaper/faster alias to summarize with (blank = main model).
compaction:
  enabled: true
  trigger: "messages:80"
  keep_messages: 20
  # model: protolabs/fast   # specific override; else routing.aux_model; else main

# Model routing.
#   aux_model: ONE cheap/fast alias for the non-reasoning calls — context
#     summarization and subagent delegation fall back to it unless they set a
#     specific override (compaction.model, or a per-subagent model). Blank =
#     main model everywhere. Each path resolves: specific → aux_model → main.
routing:
  # aux_model: protolabs/fast

# Conversation checkpoint pruning — keeps the SQLite session DB bounded. Keep the
# latest N checkpoints per chat session; TTL whole sessions idle past
# max_age_days (0 = never); sweep every prune_interval_hours (0 disables it).
checkpoint:
  keep_per_thread: 5
  max_age_days: 30
  prune_interval_hours: 6

# Workflows — reusable declarative multi-step subagent recipes (ADR 0002),
# exposed to the lead agent via the run_workflow tool. Bundled examples ship in
# the repo workflows/ dir; `dir` is the writable root for user/agent-emitted
# recipes (/sandbox → ~/.protopen fallback).
workflows:
  enabled: true
  dir: /sandbox/workflows

# Skills — human-authored SKILL.md folders (AgentSkills format) loaded into an
# FTS5 index and retrieved at inference (injected as a <learned_skills> block via
# KnowledgeMiddleware + PromptCacheMiddleware). Bundled examples ship in
# config/skills/; `dir` is the writable root for user drop-ins.
skills:
  enabled: true
  dir: /sandbox/skills
  db_path: /sandbox/skills.db
  top_k: 5

knowledge:
  db_path: /sandbox/knowledge/security.db
  embed_model: qwen3-embedding   # gateway model id (the :0.6b suffix is not a valid alias → 401)
  top_k: 10
  search_mode: hybrid  # hybrid (vector + keyword RRF), vector, keyword
  enrich_chunks: true   # prepend contextual headers to chunks before embedding
  facts: true           # extract durable semantic facts from chat (ADR 0021); background + deduped
