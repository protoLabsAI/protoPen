# protoPen LangGraph agent configuration
# Used when AGENT_BACKEND=langgraph

model:
  provider: gateway  # LiteLLM gateway on ava (Tailscale)
  name: protolabs/reasoning
  api_base: http://ava:4000/v1
  api_key: ""  # read from OPENAI_API_KEY env at runtime
  temperature: 0.3
  max_tokens: 4096
  max_iterations: 75

subagents:
  # Security Research
  threat_scanner:
    enabled: true
    tools: [cve_search, security_feeds, github_trending, browser, security_memory]
    max_turns: 30
  vuln_analyst:
    enabled: true
    tools: [cve_search, browser, security_memory, target_intel]
    max_turns: 40
  intel_reporter:
    enabled: true
    tools: [security_memory, discord_feed]
    max_turns: 20
  # Pentest
  recon:
    enabled: true
    tools: [device_manager, portapack, flipper, marauder, blackarch, engagement]
    max_turns: 30
  exploit:
    enabled: true
    tools: [device_manager, portapack, flipper, marauder, blackarch, engagement]
    max_turns: 25
  reporter:
    enabled: true
    tools: [engagement, security_memory, discord_feed]
    max_turns: 20

middleware:
  knowledge: true
  audit: true
  memory: true

knowledge:
  db_path: /sandbox/knowledge/security.db
  embed_model: qwen3-embedding:0.6b
  top_k: 10
  search_mode: hybrid  # hybrid (vector + keyword RRF), vector, keyword
  enrich_chunks: true   # prepend contextual headers to chunks before embedding
