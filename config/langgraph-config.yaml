# protoPen LangGraph agent configuration
# Used when AGENT_BACKEND=langgraph

model:
  provider: gateway  # LiteLLM gateway on ava (Tailscale)
  name: claude-sonnet-4-6
  api_base: http://ava:4000/v1
  api_key: ""  # read from OPENAI_API_KEY env at runtime
  temperature: 0.3
  max_tokens: 4096
  max_iterations: 75

subagents:
  # Research
  explorer:
    enabled: true
    tools: [discord_feed, huggingface, github_trending, browser, rabbit_hole_bridge]
    max_turns: 30
  analyst:
    enabled: true
    tools: [paper_reader, research_memory, browser, rabbit_hole_bridge]
    max_turns: 40
  writer:
    enabled: true
    tools: [research_memory, discord_feed, rabbit_hole_bridge]
    max_turns: 20
  # Pentest
  recon:
    enabled: true
    tools: [device_manager, portapack, flipper, marauder, blackarch, engagement]
    max_turns: 30
  exploit:
    enabled: true
    tools: [device_manager, portapack, flipper, marauder, blackarch, engagement]
    max_turns: 25
  reporter:
    enabled: true
    tools: [engagement, research_memory, discord_feed]
    max_turns: 20

middleware:
  knowledge: true
  audit: true
  memory: true

knowledge:
  db_path: /sandbox/knowledge/research.db
  embed_model: qwen3-embedding:0.6b
  top_k: 10
  search_mode: hybrid  # hybrid (vector + keyword RRF), vector, keyword
  enrich_chunks: true   # prepend contextual headers to chunks before embedding
