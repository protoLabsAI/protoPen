name: Deploy Marketing Site to Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - 'sites/marketing/**'
      - 'docs/**'
      - '.github/workflows/marketing-deploy.yml'
  workflow_dispatch:

# One marketing deploy at a time; cancel in-progress on a new push.
concurrency:
  group: marketing-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: namespace-profile-protolabs-linux
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 1. Marketing site (Astro) → sites/marketing/dist
      - name: Build marketing site
        working-directory: sites/marketing
        run: |
          npm install
          npm run build

      # 2. Docs (VitePress) with base /docs/ → docs/.vitepress/dist. protoPen's
      # docs:build lives at the repo root (vitepress build docs), so build here,
      # not in docs/. DOCS_BASE/DOCS_SITE_URL are read by docs/.vitepress/config.mts.
      - name: Build docs (base /docs/)
        env:
          DOCS_BASE: /docs/
          DOCS_SITE_URL: https://pen.protolabs.studio/docs/
        run: |
          npm ci
          npm run docs:build

      # 3. Fold the docs into the marketing bundle at /docs
      - name: Fold docs into marketing bundle
        run: |
          rm -rf sites/marketing/dist/docs
          mkdir -p sites/marketing/dist/docs
          cp -R docs/.vitepress/dist/. sites/marketing/dist/docs/

      # 4. Ensure the Pages project exists (wrangler does NOT auto-create on
      # deploy). Idempotent: a no-op once created. Tolerates "already exists".
      - name: Ensure Cloudflare Pages project
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        working-directory: sites/marketing
        run: |
          npx wrangler@3 pages project create protopen-marketing \
            --production-branch=main 2>err.log || {
              if grep -qiE 'already exists|8000007.*exists|with the name' err.log; then
                echo "Project already exists — continuing.";
              else
                echo "::warning::Could not create the Pages project (the deploy step will surface the real error if it's a permissions issue):";
                cat err.log;
              fi
            }

      # 5. Deploy the combined bundle to Cloudflare Pages.
      # Skipped (with a warning) until the secrets exist, so the build above
      # still validates the site on every push without a red ❌.
      - name: Deploy to Cloudflare Pages
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        working-directory: sites/marketing
        run: npx wrangler@3 pages deploy dist --project-name=protopen-marketing --branch=main

      # 6. Attach the custom domain. Idempotent + never fails the deploy: a domain
      # already attached (or a zone-not-in-account error) is logged, not fatal.
      - name: Attach custom domain (pen.protolabs.studio)
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        run: |
          resp=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/protopen-marketing/domains" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"name":"pen.protolabs.studio"}')
          echo "$resp" | head -c 500; echo
          if echo "$resp" | grep -qE '"success":[[:space:]]*true'; then
            echo "✅ Attached pen.protolabs.studio to protopen-marketing."
          elif echo "$resp" | grep -qiE 'already|exists|duplicate'; then
            echo "Custom domain already attached — continuing."
          else
            echo "::warning::Could not attach pen.protolabs.studio automatically (zone may not be in this Cloudflare account). Add it in Pages → protopen-marketing → Custom domains. Response above."
          fi

      # 7. Ensure the DNS record exists. Attaching the domain (step 6) registers it
      # on the Pages project but does NOT create the zone DNS record — without this
      # pen.protolabs.studio fails to resolve (ERR_NAME_NOT_RESOLVED). Create a
      # proxied CNAME → the Pages site. Idempotent; never fatal.
      - name: Ensure DNS record (pen → pages.dev)
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        run: |
          api="https://api.cloudflare.com/client/v4"
          first_id() { node -e 'let s="";process.stdin.on("data",d=>s+=d).on("end",()=>{try{const j=JSON.parse(s);process.stdout.write(String((j.result&&j.result[0]&&j.result[0].id)||""))}catch{process.stdout.write("")}})'; }
          arr_len() { node -e 'let s="";process.stdin.on("data",d=>s+=d).on("end",()=>{try{process.stdout.write(String((JSON.parse(s).result||[]).length))}catch{process.stdout.write("0")}})'; }
          zid=$(curl -s -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" "$api/zones?name=protolabs.studio" | first_id)
          if [ -z "$zid" ]; then
            echo "::warning::protolabs.studio zone not visible to this token — create a proxied CNAME pen → protopen-marketing.pages.dev manually."
            exit 0
          fi
          count=$(curl -s -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" "$api/zones/$zid/dns_records?name=pen.protolabs.studio" | arr_len)
          if [ "$count" != "0" ]; then
            echo "DNS record for pen.protolabs.studio already exists — continuing."
            exit 0
          fi
          resp=$(curl -s -X POST \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" -H "Content-Type: application/json" \
            "$api/zones/$zid/dns_records" \
            --data '{"type":"CNAME","name":"pen","content":"protopen-marketing.pages.dev","proxied":true,"comment":"protopen marketing (Cloudflare Pages)"}')
          echo "$resp" | head -c 400; echo
          if echo "$resp" | grep -qE '"success":[[:space:]]*true'; then
            echo "✅ created proxied CNAME pen.protolabs.studio → protopen-marketing.pages.dev"
          else
            echo "::warning::Could not create the DNS record (token may lack Zone:DNS:Edit). Add a proxied CNAME pen → protopen-marketing.pages.dev manually."
          fi

      - name: Note missing Cloudflare secrets
        if: ${{ env.CLOUDFLARE_API_TOKEN == '' }}
        run: echo "::warning::CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID not set — built the bundle but skipped deploy. Create the 'protopen-marketing' Cloudflare Pages project, add the secrets, and point pen.protolabs.studio at it to enable deploys."
