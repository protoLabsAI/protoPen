name: Deploy Marketing Site to Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - 'sites/marketing/**'
      - 'docs/**'
      - '.github/workflows/marketing-deploy.yml'
  workflow_dispatch:

# One marketing deploy at a time; cancel in-progress on a new push.
concurrency:
  group: marketing-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: namespace-profile-protolabs-linux
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 1. Marketing site (Astro) → sites/marketing/dist
      - name: Build marketing site
        working-directory: sites/marketing
        run: |
          npm install
          npm run build

      # 2. Docs (VitePress) with base /docs/ → docs/.vitepress/dist. protoPen's
      # docs:build lives at the repo root (vitepress build docs), so build here,
      # not in docs/. DOCS_BASE/DOCS_SITE_URL are read by docs/.vitepress/config.mts.
      - name: Build docs (base /docs/)
        env:
          DOCS_BASE: /docs/
          DOCS_SITE_URL: https://pen.protolabs.studio/docs/
        run: |
          npm ci
          npm run docs:build

      # 3. Fold the docs into the marketing bundle at /docs
      - name: Fold docs into marketing bundle
        run: |
          rm -rf sites/marketing/dist/docs
          mkdir -p sites/marketing/dist/docs
          cp -R docs/.vitepress/dist/. sites/marketing/dist/docs/

      # 4. Ensure the Pages project exists (wrangler does NOT auto-create on
      # deploy). Idempotent: a no-op once created. Tolerates "already exists".
      - name: Ensure Cloudflare Pages project
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        working-directory: sites/marketing
        run: |
          npx wrangler@3 pages project create protopen-marketing \
            --production-branch=main 2>err.log || {
              if grep -qiE 'already exists|8000007.*exists|with the name' err.log; then
                echo "Project already exists — continuing.";
              else
                echo "::warning::Could not create the Pages project (the deploy step will surface the real error if it's a permissions issue):";
                cat err.log;
              fi
            }

      # 5. Deploy the combined bundle to Cloudflare Pages.
      # Skipped (with a warning) until the secrets exist, so the build above
      # still validates the site on every push without a red ❌.
      - name: Deploy to Cloudflare Pages
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        working-directory: sites/marketing
        run: npx wrangler@3 pages deploy dist --project-name=protopen-marketing --branch=main
      # The custom domain + DNS for pen.protolabs.studio are provisioned by the
      # one-shot add-pages-domain.yml workflow (it needs the CLOUDFLARE_PAGES_API
      # token with Zone DNS:Edit — the deploy token here only has Pages:Edit).

      - name: Note missing Cloudflare secrets
        if: ${{ env.CLOUDFLARE_API_TOKEN == '' }}
        run: echo "::warning::CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID not set — built the bundle but skipped deploy. Create the 'protopen-marketing' Cloudflare Pages project, add the secrets, and point pen.protolabs.studio at it to enable deploys."
