name: 'Prepare Release'

# Runs after any non-release PR merges to main, OR manually.
# Bumps the version in pyproject.toml, opens a prepare-release/vX.Y.Z branch,
# commits it as "chore: release vX.Y.Z", and auto-merges back to main.
# The merge to main triggers release.yml.

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options: [patch, minor, major]
        default: patch
      dry_run:
        description: 'Preview only — no branch or PR created'
        type: boolean
        default: false

concurrency:
  group: prepare-release
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    if: >-
      github.repository == 'protoLabsAI/protoPen' &&
      (
        github.event_name == 'workflow_dispatch' ||
        (
          github.event.pull_request.merged == true &&
          !startsWith(github.event.pull_request.title, 'chore: release')
        )
      )
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Bump version
        run: python scripts/version.py ${{ inputs.bump || 'patch' }}

      - name: Read new version
        id: version
        run: |
          V=$(python -c "
          import re, pathlib
          m = re.search(r'version\s*=\s*\"([^\"]+)\"', pathlib.Path('pyproject.toml').read_text())
          print(m.group(1))
          ")
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Preview (dry run)
        if: inputs.dry_run == true
        run: |
          echo "New version: v${{ steps.version.outputs.version }}"
          git diff pyproject.toml

      - name: Create release branch + PR
        if: inputs.dry_run != true
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BRANCH="prepare-release/v${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "${BRANCH}"
          git add pyproject.toml
          git commit -m "chore: release v${VERSION}"
          git push origin "${BRANCH}"

          PR_URL=$(gh pr create \
            --base main \
            --head "${BRANCH}" \
            --title "chore: release v${VERSION}" \
            --body "Automated version bump to \`v${VERSION}\`.")
          echo "PR: ${PR_URL}"
          gh pr merge "${PR_URL}" --squash --admin
