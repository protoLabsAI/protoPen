name: 'Release'

# Triggered by a push of a vX.Y.Z tag.
# Builds and pushes the Docker image to ghcr.io, creates a GitHub release,
# and posts polished release notes to Discord.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v2.0.1)'
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: protolabsai/protopen

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}

      # ── Version ───────────────────────────────────────────────────────────────

      - name: Read version
        id: version
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      # ── Docker ────────────────────────────────────────────────────────────────

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.version.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.version.outputs.tag }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}

      # ── GitHub Release ────────────────────────────────────────────────────────

      - name: Generate release notes
        id: notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          NOTES=$(gh api "repos/${{ github.repository }}/releases/generate-notes" \
            -f tag_name="$TAG" --jq '.body' 2>/dev/null || echo "")
          # Strip chore/docs noise lines
          FILTERED=$(echo "$NOTES" | grep -Eiv '^\* (chore|docs):' || echo "$NOTES")
          {
            echo "notes<<NOTES_EOF"
            echo "$FILTERED"
            echo "NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --notes "${{ steps.notes.outputs.notes }}"

      # ── Discord ───────────────────────────────────────────────────────────────

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Post release notes to Discord
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_RELEASE_WEBHOOK }}
        run: |
          node scripts/post-release-notes.mjs \
            --title "${{ steps.version.outputs.tag }}"
