# Build + publish the protoPen SteamOS runtime image to GHCR. Tracker: protopen-3t5.3.
# Heavy (Arch + BlackArch + libhackrf + chromium), so it runs only on a
# `deck-image-v*` tag or manual dispatch — never on every push/PR.
name: deck-runtime-image

on:
  push:
    tags: ['deck-image-v*']
  workflow_dispatch:
    inputs:
      install_blackarch:
        description: 'Bake the BlackArch toolchain (1=yes, 0=lean)'
        default: '1'
      tag:
        description: 'Image tag'
        default: 'latest'

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    # workspace-config: allow-hosted-runner docker buildx build + registry push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free up runner disk
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android "$AGENT_TOOLSDIRECTORY" || true
          df -h /

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        run: |
          img="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/protopen-runtime"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            ver="${GITHUB_REF_NAME#deck-image-v}"   # deck-image-v0.1.0 -> 0.1.0
            echo "tags=${img}:${ver},${img}:latest" >> "$GITHUB_OUTPUT"
          else
            echo "tags=${img}:${{ github.event.inputs.tag || 'latest' }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deck/Containerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            INSTALL_BLACKARCH=${{ github.event.inputs.install_blackarch || '1' }}
