name: CI

on:
  push:
    branches: [main, "epic/**"]
  pull_request:
    branches: [main, "epic/**"]
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  workspace-config:
    name: Verify workspace config
    runs-on: namespace-profile-protolabs-linux
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Verify workspace config (.beads / .automaker / owned runners)
        # Fleet workspace-config standard (matches protoAgent checks.yml). The npm
        # package is still 1.0.0 (predates verify-workspace-config), so run the
        # v1.1.0 script directly — it's zero-dependency (node builtins only).
        # Switch to `npx -p @protolabsai/release-tools verify-workspace-config`
        # once 1.1.0+ is published (protoLabsAI/release-tools#27).
        run: |
          git clone --depth 1 \
            https://github.com/protoLabsAI/release-tools /tmp/release-tools
          node /tmp/release-tools/bin/verify-workspace-config.mjs --root "$GITHUB_WORKSPACE"

  lint:
    name: Lint
    runs-on: namespace-profile-protolabs-linux
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install lint tools
        run: pip install ruff

      - name: Ruff — lint
        run: ruff check . --output-format=github

      - name: Ruff — format check
        run: ruff format --check .

      - name: No hang-prone subprocess timeouts
        run: python scripts/check_subprocess_timeout.py --check

  test:
    name: Test
    runs-on: namespace-profile-protolabs-linux
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-mock

      - name: Run tests
        run: python -m pytest tests/ -q --tb=short -x

      - name: Syntax check — tools
        run: |
          python -m py_compile tools/*.py tools/parsers/*.py
          echo "All tool modules parse clean"

      - name: Tool catalog is in sync (README + docs)
        run: python scripts/gen_tool_docs.py --check

      - name: API reference is in sync with the OpenAPI spec
        run: python scripts/gen_api_docs.py --check

      # The check above only compares the page to the committed spec; this one
      # compares the committed spec to the LIVE app, so a new route can't slip in
      # undocumented (how GET /api/tools + the engagement-control POST drifted).
      # Runs once (3.12) — it builds the app to dump the spec.
      - name: OpenAPI spec is in sync with the live app
        if: matrix.python-version == '3.12'
        env:
          OPENAI_API_KEY: dummy-for-spec-dump
        run: python scripts/check_openapi_spec.py

  build:
    name: Build & Push Docker
    # workspace-config: allow-hosted-runner docker buildx build + registry push
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/protolabsai/protopen
          tags: |
            type=sha,prefix=,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
